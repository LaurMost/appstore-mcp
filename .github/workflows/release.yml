name: Release to PyPI

# Publishes on every GitHub release via PyPI trusted publishing (OIDC) -
# no API token stored in the repo. One-time setup on pypi.org:
#   Add a "pending publisher" for project `appstore-mcp` with
#   owner=LaurMost, repo=appstore-mcp, workflow=release.yml, environment=pypi.
on:
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv sync --dev
      - run: uv run pytest -q
      - run: uv run mypy
      - run: uv build
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
